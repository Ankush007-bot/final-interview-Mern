<!DOCTYPE html>
<html>
<body>
  <input id="username" placeholder="Enter your username" />
  <button onclick="setUsername()">Set Username</button>
  <hr />

  <select id="toUser"></select>
  <input id="msg" placeholder="Type message" />
  <button onclick="sendPrivateMessage()">Send</button>
  <ul id="messages"></ul>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myUsername = '';

    function setUsername() {
      myUsername = document.getElementById('username').value;
      socket.emit('set_username', myUsername);
    }

    // Update user dropdown
    socket.on('users_list', (usernames) => {
      const select = document.getElementById('toUser');
      select.innerHTML = '';
      usernames.forEach(u => {
        if (u !== myUsername) {
          const option = document.createElement('option');
          option.value = u;
          option.text = u;
          select.appendChild(option);
        }
      });
    });

    function sendPrivateMessage() {
      const toUsername = document.getElementById('toUser').value;
      const message = document.getElementById('msg').value;
      socket.emit('private_message', { toUsername, message });
      document.getElementById('msg').value = '';
    }

    socket.on('receive_message', ({ from, message }) => {
      const li = document.createElement('li');
      li.innerText = `${from}: ${message}`;
      document.getElementById('messages').appendChild(li);
    });
  </script>
</body>
</html>
